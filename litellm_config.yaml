# LiteLLM public/front-door proxy configuration.
#
# Runtime model aliases are owned by the admin provider registry and synced into
# LiteLLM through /admin/model-aliases/*/sync. Do not define production aliases
# such as code-premium here: static config entries shadow DB-backed aliases and
# prevent operator sync/rotation from changing live routing.

model_list: []

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true

litellm_settings:
  drop_params: true
  request_timeout: 600
  set_verbose: false
  success_callback: ['proxy_base_cost_tracking']
  failure_callback: ['proxy_base_cost_tracking']
