# LiteLLM public/front-door proxy configuration.
# Users call LiteLLM with their personal team-llm-gateway key. For this MVP,
# the control plane stores and reports keys; proxy enforcement is documented as
# the next integration phase.
#
# To swap upstream providers later, keep the public model_name aliases stable
# and change litellm_params.api_base/api_key/model to the new OpenAI-compatible
# provider values.

model_list:
  - model_name: gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_base: os.environ/NINE_ROUTER_BASE_URL
      api_key: os.environ/NINE_ROUTER_API_KEY

  - model_name: gpt-5.5-thinking
    litellm_params:
      model: openai/gpt-5.5-thinking
      api_base: os.environ/NINE_ROUTER_BASE_URL
      api_key: os.environ/NINE_ROUTER_API_KEY

  - model_name: codex-default
    litellm_params:
      model: openai/codex-default
      api_base: os.environ/NINE_ROUTER_BASE_URL
      api_key: os.environ/NINE_ROUTER_API_KEY

  - model_name: codex-premium
    litellm_params:
      model: openai/codex-premium
      api_base: os.environ/NINE_ROUTER_BASE_URL
      api_key: os.environ/NINE_ROUTER_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
  request_timeout: 600
  set_verbose: false
