services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tlg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tlg}
      POSTGRES_DB: ${POSTGRES_DB:-team_llm_gateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tlg:tlg@postgres:5432/team_llm_gateway?schema=app}
      DIRECT_URL: ${DIRECT_URL:-postgresql://tlg:tlg@postgres:5432/team_llm_gateway?schema=app}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      LITELLM_PROXY_URL: ${LITELLM_PROXY_URL:-http://litellm:4000}
      ROUTER_BASE_URL: ${ROUTER_BASE_URL:-${NINE_ROUTER_BASE_URL:-http://9router:20128/v1}}
      ROUTER_API_KEY: ${ROUTER_API_KEY:-${NINE_ROUTER_API_KEY:-}}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy --schema prisma/schema.prisma && node apps/api/dist/server.js"

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    env_file:
      - .env
    environment:
      DATABASE_URL: ${LITELLM_DATABASE_URL:-postgresql://tlg:tlg@postgres:5432/team_llm_gateway?schema=litellm}
      ROUTER_BASE_URL: ${ROUTER_BASE_URL:-${NINE_ROUTER_BASE_URL:-http://9router:20128/v1}}
      ROUTER_API_KEY: ${ROUTER_API_KEY:-${NINE_ROUTER_API_KEY:-}}
    command: ['--config', '/app/config.yaml', '--port', '4000']
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    ports:
      - '${LITELLM_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
